<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EloSC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="icon" type="" href="/Logo.svg" />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,400;1,500&family=Prompt:wght@900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Applies dark class synchronously before React renders to prevent flash -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('erp-theme')
          if (stored) {
            var s = JSON.parse(stored)
            if (s && s.state && s.state.theme === 'dark') {
              document.documentElement.classList.add('dark')
            }
          }
        } catch (e) {}
      })()
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
